<!DOCTYPE html>
<html>
<head>
  <title>Email Refiner</title>
  <style>
    body {
      width: 350px;
      padding: 15px;
      font-family: Arial, sans-serif;
    }
    h2 {
      color: #2c3e50;
      margin-top: 0;
    }
    textarea {
      width: 100%;
      height: 150px;
      margin-bottom: 10px;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: Arial, sans-serif;
      resize: vertical;
    }
    button {
      padding: 8px 15px;
      cursor: pointer;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: bold;
    }
    button:hover {
      background-color: #2980b9;
    }
    #refinedText {
      margin-top: 15px;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 10px;
      background-color: #f9f9f9;
      white-space: pre-wrap; /* Preserve line breaks */
    }
    .status {
      margin: 10px 0;
      padding: 5px;
      border-radius: 4px;
    }
    .error {
      background-color: #ffecec;
      color: #e74c3c;
    }
    .success {
      background-color: #e7f4e4;
      color: #27ae60;
    }
  </style>
</head>
<body>
  <h2>Email Refiner</h2>
  <!-- API key elements will be inserted here by JS -->
  
  <textarea id="originalEmail" placeholder="Paste your email here or type in Gmail compose window..."></textarea>
  <button id="refineButton">Refine Email</button>
  
  <div id="refinedText" style="display: none;">
    <h3>Refined Email:</h3>
    <p id="refinedOutput"></p>
    <button id="copyButton" style="margin-top: 10px;">Copy to Clipboard</button>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
